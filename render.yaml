# Render Blueprint — MyVilla backend (Django) + PostgreSQL.
#
# Deploy: Render Dashboard → New + → Blueprint → pick the `myvilla-backend` repo.
# Render reads this file, creates the DB + web service, and auto-wires
# DATABASE_URL. You'll be prompted to fill the `sync: false` secrets below.
#
# The Dockerfile's start command already runs migrate + collectstatic +
# gunicorn (bound to $PORT), so no extra build/start commands are needed here.

databases:
  - name: myvilla-db
    plan: free
    region: singapore

services:
  - type: web
    name: myvilla-backend
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      # Auto-generated by Render (never stored in the repo)
      - key: SECRET_KEY
        generateValue: true
      # Auto-wired from the database above
      - key: DATABASE_URL
        fromDatabase:
          name: myvilla-db
          property: connectionString
      # Core
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: ACCESS_TOKEN_LIFETIME_MIN
        value: "60"
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      # Frontend (Vercel) — CORS + password-reset email links
      - key: CORS_ALLOWED_ORIGINS
        value: "https://myvilla-frontend.vercel.app"
      - key: FRONTEND_URL
        value: "https://myvilla-frontend.vercel.app"
      # HTTPS hardening (Render serves TLS)
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: "MyVilla <no-reply@myvilla.com>"
      # --- Fill these in the Render dashboard (secrets / optional) ---
      # Cloudinary: REQUIRED for persistent images (Render disk is ephemeral).
      - key: CLOUDINARY_URL
        sync: false
      # Email (leave blank → console mode, no real emails sent)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
