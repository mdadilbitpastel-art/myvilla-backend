# Render Blueprint — MyVilla backend (Django).
#
# Deploy: Render Dashboard → New + → Blueprint → pick the `myvilla-backend` repo.
#
# NOTE: We do NOT create a database here. Render's free tier allows only one
# active free Postgres, and we reuse a single shared DB across projects. MyVilla
# keeps its tables in a dedicated schema (DB_SCHEMA below) so the built-in Django
# tables don't collide with other projects' — set DATABASE_URL in the dashboard
# to point at that shared DB.
#
# The Dockerfile's start command runs ensure_schema + migrate + collectstatic +
# gunicorn (bound to $PORT), so no extra build/start commands are needed here.

services:
  - type: web
    name: myvilla-backend
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      # Auto-generated by Render (never stored in the repo)
      - key: SECRET_KEY
        generateValue: true
      # Shared Postgres — set this in the Render dashboard (never in the repo).
      - key: DATABASE_URL
        sync: false
      # Dedicated schema inside the shared DB so this project's tables and
      # migration history stay isolated from other projects on the same DB.
      - key: DB_SCHEMA
        value: "myvilla"
      # Core
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: ACCESS_TOKEN_LIFETIME_MIN
        value: "60"
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      # Frontend (Vercel) — CORS + password-reset email links
      - key: CORS_ALLOWED_ORIGINS
        value: "https://myvilla-frontend.vercel.app"
      - key: FRONTEND_URL
        value: "https://myvilla-frontend.vercel.app"
      # HTTPS hardening (Render serves TLS)
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: "MyVilla <no-reply@myvilla.com>"
      # Google Sign-In. Public OAuth *web* client id — not a secret, and it has
      # to match the frontend's NEXT_PUBLIC_GOOGLE_CLIENT_ID exactly, so it
      # lives here rather than in the dashboard where the two could drift.
      - key: GOOGLE_CLIENT_ID
        value: "200247826573-obic2s9dorps8c05lek2htvg6dk7jso1.apps.googleusercontent.com"
      # --- Fill these in the Render dashboard (secrets / optional) ---
      # Cloudinary: REQUIRED for persistent images (Render disk is ephemeral).
      - key: CLOUDINARY_URL
        sync: false
      # Email (leave blank → console mode, no real emails sent)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
